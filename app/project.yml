name: GmailMCP
options:
  bundleIdPrefix: com.lokilabs
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "13.0"
targets:
  GmailMCP:
    type: application
    platform: macOS
    sources:
      - path: GmailMCP
        excludes:
          - "GmailMCP.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lokilabs.GmailMCP
        PRODUCT_NAME: AnyMail MCP
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        MACOSX_DEPLOYMENT_TARGET: "13.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: GmailMCP/GmailMCP.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: "Loki Labs"
