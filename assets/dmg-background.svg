<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!--
    DMG installer background for AnyMail MCP. Rasterize to PNG (600x400 @1x,
    1200x800 @2x) with: rsvg-convert -w 600 -h 400 dmg-background.svg -o bg.png
    create-dmg places the app icon at (150,190) and /Applications at (450,190);
    this art fills the space around those slots — title on top, an arrow between.
  -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22d3ee"/>
      <stop offset="1" stop-color="#2dd4bf"/>
    </linearGradient>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="5" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2dd4bf"/>
    </marker>
  </defs>

  <rect width="600" height="400" fill="url(#bg)"/>

  <!-- subtle envelope motif, top-left, low opacity -->
  <g opacity="0.06" stroke="#e2e8f0" stroke-width="3" fill="none">
    <rect x="30" y="30" width="70" height="48" rx="6"/>
    <path d="M30 36 L65 60 L100 36"/>
  </g>

  <!-- wordmark -->
  <text x="300" y="66" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="30" font-weight="700" fill="#f1f5f9">AnyMail<tspan fill="url(#accent)"> MCP</tspan></text>
  <text x="300" y="94" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="13" fill="#94a3b8">Multi-account email for your AI agent</text>

  <!-- drag arrow between the app icon (left) and Applications (right) -->
  <line x1="228" y1="190" x2="368" y2="190" stroke="url(#accent)" stroke-width="5"
        stroke-linecap="round" marker-end="url(#arrowhead)"/>
  <text x="300" y="228" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="12" fill="#64748b">drag to install</text>

  <!-- footer hint -->
  <text x="300" y="372" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif"
        font-size="11" fill="#475569">After installing, open AnyMail MCP and add your accounts.</text>
</svg>
